# =============================================================================
# nightly.yml — Nightly / Dev Release Pipeline
# =============================================================================
# Purpose:
#   Builds and publishes a rolling "nightly" pre-release from the latest
#   main branch (or manually from any branch). Users install it with:
#
#     pip install "git+https://github.com/T-O-M-Tool-Oauto-Mationator/scpi-instrument-toolkit.git@nightly"
#
#   The nightly tag is force-updated on every run so it always points to
#   the latest build. Stable releases (v0.1.x tags) are unaffected.
#
# Triggers:
#   - Nightly cron at 06:00 UTC (midnight CST)
#   - Manual dispatch (workflow_dispatch) — pick any branch
#
# Install channels:
#   Stable:   pip install "git+https://...@v0.1.138"
#   Nightly:  pip install "git+https://...@nightly"
# =============================================================================

name: Nightly

on:
  schedule:
    # 06:00 UTC = midnight CST
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build from (default: dev/nightly)"
        required: false
        default: "dev/nightly"

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # test — run the full test suite before publishing anything
  # ---------------------------------------------------------------------------
  test:
    name: Test (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'dev/nightly' }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install test dependencies
        shell: bash
        run: |
          pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run test suite
        shell: bash
        run: pytest tests/ -v --tb=short -m "not hardware"

  # ---------------------------------------------------------------------------
  # build — produce sdist + wheel with a .devYYYYMMDD version suffix
  # ---------------------------------------------------------------------------
  build:
    name: Build nightly dist
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'dev/nightly' }}
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        shell: bash
        run: pip install --upgrade pip build

      - name: Stamp dev version
        shell: bash
        run: |
          DATE=$(date -u +%Y%m%d)
          SHORT_SHA=$(git rev-parse --short HEAD)
          BRANCH="${{ github.event.inputs.branch || 'dev/nightly' }}"

          # Read base version from pyproject.toml
          BASE=$(python3 -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['version'])
          ")

          DEV_VERSION="${BASE}.dev${DATE}"
          echo "Nightly version: ${DEV_VERSION} (branch: ${BRANCH}, sha: ${SHORT_SHA})"

          # Patch pyproject.toml with dev version
          python3 -c "
          import re, pathlib
          p = pathlib.Path('pyproject.toml')
          text = p.read_text()
          text = re.sub(r'version\s*=\s*\"[^\"]+\"', 'version = \"${DEV_VERSION}\"', text)
          p.write_text(text)
          "

          echo "dev_version=${DEV_VERSION}" >> "$GITHUB_ENV"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "branch=${BRANCH}" >> "$GITHUB_ENV"

      - name: Build distribution
        shell: bash
        run: python -m build

      - name: Print artifact checksums
        shell: bash
        run: |
          echo "## Nightly Build" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** \`${dev_version}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Branch:** \`${branch}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** \`${short_sha}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | SHA-256 |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|---------|" >> "$GITHUB_STEP_SUMMARY"
          for f in dist/*; do
            HASH=$(sha256sum "$f" | awk '{print $1}')
            echo "| \`$(basename "$f")\` | \`${HASH}\` |" >> "$GITHUB_STEP_SUMMARY"
          done
          sha256sum dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-dist
          path: dist/
          retention-days: 30

  # ---------------------------------------------------------------------------
  # publish — update the rolling "nightly" tag and GitHub pre-release
  # ---------------------------------------------------------------------------
  publish:
    name: Publish nightly release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'dev/nightly' }}
          fetch-depth: 0

      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: nightly-dist
          path: dist/

      - name: Stamp dev version in source and force-update nightly tag
        shell: bash
        run: |
          DATE=$(date -u +%Y%m%d)
          BASE=$(python3 -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['version'])
          ")
          DEV_VERSION="${BASE}.dev${DATE}"

          # Patch pyproject.toml so pip install git+...@nightly gets the dev version
          python3 -c "
          import re, pathlib
          p = pathlib.Path('pyproject.toml')
          text = p.read_text()
          text = re.sub(r'version\s*=\s*\"[^\"]+\"', 'version = \"${DEV_VERSION}\"', text)
          p.write_text(text)
          "

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "nightly: stamp version ${DEV_VERSION} [skip ci]"
          git tag -f nightly HEAD
          git push origin nightly --force

      - name: Create or update nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly Build"
          body: |
            ## Nightly Build

            Rolling pre-release from the latest `${{ github.event.inputs.branch || 'dev/nightly' }}` branch.
            Updated automatically — **not for production use**.

            ### Install

            ```bash
            pip install "git+https://github.com/T-O-M-Tool-Oauto-Mationator/scpi-instrument-toolkit.git@nightly"
            ```

            ### Commit

            `${{ github.sha }}` on `${{ github.event.inputs.branch || 'dev/nightly' }}`
          prerelease: true
          files: dist/*
          fail_on_unmatched_files: true
