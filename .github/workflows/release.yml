# =============================================================================
# release.yml — Release Pipeline
# =============================================================================
# Purpose:
#   Validates the release tag matches pyproject.toml, runs the full test
#   suite, builds sdist + wheel, publishes to PyPI via OIDC Trusted Publisher,
#   and creates a GitHub Release with the dist assets attached.
#
# Triggers:
#   - Push of a tag matching v<major>.<minor>.<patch>  (e.g. v0.1.136)
#
# Required GitHub configuration (one-time setup — see Setup Checklist):
#   1. GitHub Environment named "pypi" (Settings → Environments)
#      - Optionally add required reviewers or a wait timer.
#   2. PyPI Trusted Publisher configured on pypi.org:
#        Owner:     T-O-M-Tool-Oauto-Mationator
#        Repo:      scpi-instrument-toolkit
#        Workflow:  release.yml
#        Env:       pypi
#      This allows OIDC token exchange — no PYPI_API_TOKEN secret is needed.
#
# Job graph:
#   validate-version ──> test ──> build ──┬──> publish-pypi
#                                         └──> github-release
#                                               (waits for publish-pypi too)
# =============================================================================

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

# Top-level least-privilege defaults.
# contents: write  — github-release job creates a GitHub Release.
# id-token: write  — publish-pypi job exchanges OIDC token with PyPI.
permissions:
  contents: write
  id-token: write

jobs:
  # ---------------------------------------------------------------------------
  # validate-version — asserts the pushed tag matches pyproject.toml version.
  # Uses Python 3.12 for stdlib tomllib (3.11+).
  # Fails immediately with a clear message if they diverge.
  # ---------------------------------------------------------------------------
  validate-version:
    name: Validate tag matches pyproject.toml
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compare git tag with pyproject.toml version
        shell: bash
        run: |
          # Strip the leading "v" from the tag ref (refs/tags/v0.1.136 → 0.1.136)
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"

          TOML_VERSION=$(python3 - <<'EOF'
          import tomllib
          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)
          print(data["project"]["version"])
          EOF
          )

          echo "Git tag version:        ${TAG_VERSION}"
          echo "pyproject.toml version: ${TOML_VERSION}"

          if [ "${TAG_VERSION}" != "${TOML_VERSION}" ]; then
            echo "::error::Version mismatch — tag is v${TAG_VERSION} but pyproject.toml declares ${TOML_VERSION}."
            echo "::error::Update pyproject.toml to match the tag before releasing."
            exit 1
          fi

          echo "Versions match. Proceeding."

  # ---------------------------------------------------------------------------
  # test — full test suite on Python 3.12 (CI already covers 3.8 + 3.10).
  # Release must not proceed if any test fails.
  # ---------------------------------------------------------------------------
  test:
    name: Release test suite (Python 3.12)
    runs-on: ubuntu-latest
    needs: validate-version
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install test dependencies
        shell: bash
        run: |
          pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run test suite
        shell: bash
        run: |
          pytest tests/ -v --tb=short -m "not hardware"

  # ---------------------------------------------------------------------------
  # build — produces sdist + wheel, prints SHA-256 checksums for audit trail,
  # and uploads dist/ as a workflow artifact retained for 90 days.
  # ---------------------------------------------------------------------------
  build:
    name: Build sdist and wheel
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        shell: bash
        run: pip install --upgrade pip build

      - name: Build distribution
        shell: bash
        run: python -m build

      - name: Print artifact checksums
        shell: bash
        run: |
          echo "## Release Artifacts" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | SHA-256 |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|---------|" >> "$GITHUB_STEP_SUMMARY"
          for f in dist/*; do
            HASH=$(sha256sum "$f" | awk '{print $1}')
            echo "| \`$(basename "$f")\` | \`${HASH}\` |" >> "$GITHUB_STEP_SUMMARY"
          done
          echo ""
          sha256sum dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 90

  # ---------------------------------------------------------------------------
  # publish-pypi — publishes to PyPI using OIDC Trusted Publisher (no tokens).
  # Runs inside the "pypi" GitHub Environment for deployment protection rules.
  # skip-existing: true makes retries safe if the version already landed.
  # ---------------------------------------------------------------------------
  publish-pypi:
    name: Publish to PyPI (OIDC)
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

  # ---------------------------------------------------------------------------
  # github-release — creates a GitHub Release with the dist assets attached.
  # Waits for publish-pypi so the release is only created after PyPI succeeds.
  # Marks the release as pre-release if the tag contains rc, alpha, or beta.
  # ---------------------------------------------------------------------------
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, publish-pypi]
    permissions:
      contents: write
    steps:
      - name: Checkout repository (for git log)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Detect pre-release
        id: prerelease
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if echo "$TAG" | grep -qE "(rc|alpha|beta)"; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate changelog since previous tag
        id: changelog
        shell: bash
        run: |
          CURRENT_TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${CURRENT_TAG}$" | head -n1)
          echo "Current tag: ${CURRENT_TAG}"
          echo "Previous tag: ${PREV_TAG:-<none>}"

          {
            echo 'body<<CHANGELOG_EOF'
            if [ -n "$PREV_TAG" ]; then
              git log --pretty="- %s" "${PREV_TAG}..${CURRENT_TAG}"
            else
              git log --pretty="- %s"
            fi
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: ${{ steps.changelog.outputs.body }}
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          fail_on_unmatched_files: true
