# =============================================================================
# dependency-review.yml — Dependency Vulnerability Scanning
# =============================================================================
# Purpose:
#   Scans dependency changes introduced in a pull request against GitHub's
#   Advisory Database. Fails the PR if any added or updated dependency has a
#   known HIGH or CRITICAL severity vulnerability (CVSS ≥ 7.0).
#
# Triggers:
#   - Every pull request targeting main
#
# Required secrets / environments:
#   None — uses the built-in GITHUB_TOKEN with read-only contents access.
#   Note: The repository must be public OR have a GitHub Advanced Security
#   license for the dependency-review-action to access the advisory database.
#
# Allow-list:
#   None (strict mode) — all HIGH and CRITICAL advisories block the PR.
#   To add exceptions in the future, use the `allow-ghsas` or
#   `allow-licenses` inputs on the action.
# =============================================================================

name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    steps:
      - name: Check dependency graph support
        id: depgraph
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const { data } = await github.rest.repos.get({ owner, repo });
            const depGraph = data.security_and_analysis?.dependency_graph?.status;
            const supported = depGraph === 'enabled';
            core.setOutput('supported', String(supported));

            if (supported) {
              core.notice('Dependency Graph is enabled. Running dependency review.');
            } else {
              core.notice(
                'Dependency review skipped: Dependency Graph is not enabled for this repository. ' +
                'Enable it in Settings > Security & analysis.'
              );
            }

      - name: Checkout repository
        if: steps.depgraph.outputs.supported == 'true'
        uses: actions/checkout@v4

      - name: Scan dependencies for vulnerabilities
        if: steps.depgraph.outputs.supported == 'true'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
