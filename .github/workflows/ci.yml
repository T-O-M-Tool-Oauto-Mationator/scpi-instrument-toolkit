# =============================================================================
# ci.yml — Continuous Integration
# =============================================================================
# Purpose:
#   Lint the codebase with ruff, run the full mock-based test suite across
#   three Python versions, and enforce an 80% line-coverage gate.
#
# Triggers:
#   - Every push to any branch
#   - Every pull request targeting main
#
# Required secrets / environments:
#   None — all jobs use GitHub-hosted runners and read-only access.
#
# Job graph:
#   lint ──> test [3.10, 3.12] ──> coverage-gate
# =============================================================================

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Least-privilege default: all jobs get read-only contents.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # lint — ruff check + ruff format
  # Runs on Python 3.12 only; linting is version-independent.
  # Blocking: test jobs will not start if lint fails.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install lint dependencies
        shell: bash
        run: |
          pip install --upgrade pip
          pip install -e ".[lint]"

      - name: ruff check (linting)
        shell: bash
        run: ruff check --output-format=github lab_instruments/ tests/

      - name: ruff format --check (formatting)
        shell: bash
        run: ruff format --check lab_instruments/ tests/

  # ---------------------------------------------------------------------------
  # test — pytest with coverage, matrix: Python 3.10 / 3.12
  # All 593 tests are mock-based; no physical instruments are required.
  # Artifacts (JUnit XML + coverage XML) are retained for 14 days.
  # ---------------------------------------------------------------------------
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install test dependencies
        shell: bash
        run: |
          pip install --upgrade pip
          pip install -e ".[test]"

      - name: Create reports directory
        shell: bash
        run: mkdir -p reports

      - name: Run test suite
        shell: bash
        run: |
          pytest tests/ \
            -v --tb=short \
            -m "not hardware" \
            --junit-xml=reports/junit-py${{ matrix.python-version }}.xml \
            --cov=lab_instruments \
            --cov-report=xml:reports/coverage-py${{ matrix.python-version }}.xml \
            --cov-report=term-missing

      - name: Post coverage summary to GitHub Step Summary
        if: always()
        shell: bash
        run: |
          PYVER="${{ matrix.python-version }}"
          XML="reports/coverage-py${PYVER}.xml"
          echo "## Test Results — Python ${PYVER}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f "$XML" ]; then
            LINE_RATE=$(python3 - <<'EOF'
          import xml.etree.ElementTree as ET, sys
          tree = ET.parse("reports/coverage-py${{ matrix.python-version }}.xml")
          rate = float(tree.getroot().attrib["line-rate"]) * 100
          print(f"{rate:.1f}")
          EOF
            )
            echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
            echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| Line coverage | **${LINE_RATE}%** |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "> Coverage report was not generated (tests may have failed)." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: reports/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # coverage-gate — enforces ≥80% line coverage using the py3.12 XML report.
  # Runs after all matrix test jobs complete (pass or fail).
  # ---------------------------------------------------------------------------
  coverage-gate:
    name: Coverage gate (>=80%)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Download Python 3.12 test artifacts
        uses: actions/download-artifact@v4
        with:
          name: test-results-py3.12
          path: reports/

      - name: Check coverage threshold
        shell: bash
        env:
          COVERAGE_THRESHOLD: "80.0"
          MIN_EXECUTABLE_LINES: "5"
        run: |
          python3 - <<'EOF'
          import os
          import xml.etree.ElementTree as ET
          import sys

          xml_path = "reports/coverage-py3.12.xml"
          try:
              tree = ET.parse(xml_path)
          except FileNotFoundError:
              print(f"::error::Coverage XML not found at {xml_path}. Did the test job succeed?")
              sys.exit(1)

          threshold = float(os.environ.get("COVERAGE_THRESHOLD", "80.0"))
          min_executable_lines = int(os.environ.get("MIN_EXECUTABLE_LINES", "5"))
          root = tree.getroot()

          # --- Total coverage check ---
          total_rate = float(root.attrib["line-rate"]) * 100
          print(f"Total line coverage: {total_rate:.1f}%  (threshold: {threshold:.0f}%)")
          if total_rate < threshold:
              print(f"::error::Total coverage {total_rate:.1f}% is below the required {threshold:.0f}% threshold.")
              sys.exit(1)

          # --- Per-file coverage check ---
          failures = []
          for cls in root.findall(".//class"):
              filename = cls.attrib.get("filename", "")
              # Skip generated/site files
              if not filename.startswith("lab_instruments/") or "/site/" in filename:
                  continue
              lines = cls.findall("lines/line")
              if len(lines) < min_executable_lines:
                  # Skip tiny files — not meaningful to gate
                  continue
              raw_rate = cls.attrib.get("line-rate")
              if raw_rate is None:
                  print(f"::warning file={filename}::line-rate attribute missing; treating as 0%")
                  file_rate = 0.0
              else:
                  file_rate = float(raw_rate) * 100
              if file_rate < threshold:
                  failures.append((filename, file_rate))

          if failures:
              print(f"\nPer-file coverage failures ({len(failures)} file(s) below {threshold:.0f}%):")
              for fname, rate in sorted(failures):
                  print(f"  {fname}: {rate:.1f}%")
                  print(f"::error file={fname}::Coverage {rate:.1f}% is below the required {threshold:.0f}% threshold.")
              sys.exit(1)

          print("Coverage gate passed (total + per-file).")
          EOF
