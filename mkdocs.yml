site_name: SCPI Instrument Toolkit
site_dir: lab_instruments/site
use_directory_urls: false
site_description: Python REPL for controlling lab instruments over VISA
repo_url: https://github.com/T-O-M-Tool-Oauto-Mationator/scpi-instrument-toolkit
repo_name: T-O-M-Tool-Oauto-Mationator/scpi-instrument-toolkit

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow

plugins:
  - search
  - gen-files:
      scripts:
        - scripts/gen_ref_pages.py
  - mkdocstrings:
      handlers:
        python:
          paths: ["."]
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            show_signature_annotations: true
            separate_signature: true
            members_order: source
            filters:
              - "!^_"

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      linenums: false
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation: install.md
  - Supported Instruments: instruments.md
  - REPL:
    - General Commands: general.md
    - Power Supply (PSU): psu.md
    - Function Generator (AWG): awg.md
    - Multimeter (DMM): dmm.md
    - Oscilloscope (Scope): scope.md
    - Source Measure Unit (SMU): smu.md
    - USB-to-I2C Adapter (EV2300): ev2300.md
    - NI PXIe-4139 Setup: ni_pxie.md
    - Scripting: scripting.md
    - Example Workflows: examples.md
    - Log & Calc: logging.md
  - Python API:
    - Quickstart: python.md
    - Enumerations: api/enums.md
    - Power Supplies: api/psu.md
    - Multimeters: api/dmm.md
    - Function Generators: api/awg.md
    - Oscilloscopes: api/scope.md
    - Source Measure Unit: api/smu.md
    - USB-to-I2C (EV2300): api/ev2300.md
    - Base Class: api/base.md
  - Reference:
    - Instruments & Capabilities: generated/instruments.md
    - REPL Command Reference: generated/repl-ref.md
  - LabVIEW Bridge: labview.md
  - Architecture: architecture.md
  - Troubleshooting: troubleshooting.md
